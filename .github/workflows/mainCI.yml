name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches: [main]

env:
  REGISTRY_TYPE: both
  WORKING_DIRECTORY: src
  NODE_VERSION: '20'
  DOCKER_CONTEXT: src
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: ${{ github.event.repository.name }}
  DOCKERHUB_TAGS: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ github.sha }}
  ECR_TAGS: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ github.event.repository.name }}:${{ github.sha }}

jobs:
  test:
    uses: ./.github/workflows/ci/test.yml
    with:
      working-directory: ${{ env.WORKING_DIRECTORY }}
      node-version: ${{ env.NODE_VERSION }}

  build-and-push-dockerhub:
    needs: test
    if: github.ref == 'refs/heads/main' && (env.REGISTRY_TYPE == 'dockerhub' || env.REGISTRY_TYPE == 'both')
    uses: ./.github/workflows/ci/build.yml
    with:
      context: ${{ env.DOCKER_CONTEXT }}
      registry-type: dockerhub
      image-tags: ${{ env.DOCKERHUB_TAGS }}
    secrets:
      docker-username: ${{ env.DOCKER_USERNAME }}
      docker-password: ${{ env.DOCKER_PASSWORD }}

  build-and-push-ecr:
    needs: test
    if: github.ref == 'refs/heads/main' && (env.REGISTRY_TYPE == 'ecr' || env.REGISTRY_TYPE == 'both')
    uses: ./.github/workflows/ci/build.yml
    with:
      context: ${{ env.DOCKER_CONTEXT }}
      registry-type: ecr
      aws-region: ${{ env.AWS_REGION }}
      image-tags: ${{ env.ECR_TAGS }}
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
name: Main CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
  workflow_dispatch:

env:
  TF_WORKING_DIR: ./terraform/env/test

jobs:
  resolve-ecr:
    runs-on: ubuntu-latest
    outputs:
      ecr_url: ${{ steps.get-ecr.outputs.ecr_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION || '1.9.0' }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Get ECR URL from remote state
        id: get-ecr
        run: |
          URL=$(terraform output -raw ecr_repository_url)
          echo "ecr_url=$URL" >> $GITHUB_OUTPUT
        working-directory: ${{ env.TF_WORKING_DIR }}

  build-and-push-dockerhub:
    if: vars.REGISTRY_TYPE == 'dockerhub' || vars.REGISTRY_TYPE == 'both' || vars.REGISTRY_TYPE == ''
    uses: ./.github/workflows/ci/build.yml
    with:
      context: src
      registry-type: dockerhub
      image-tags: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ github.sha }}
    secrets:
      docker-username: ${{ secrets.DOCKER_USERNAME }}
      docker-password: ${{ secrets.DOCKER_PASSWORD }}

  build-and-push-ecr:
    needs: resolve-ecr
    if: vars.REGISTRY_TYPE == 'ecr' || vars.REGISTRY_TYPE == 'both'
    uses: ./.github/workflows/ci/build.yml
    with:
      context: src
      registry-type: ecr
      aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
      image-tags: ${{ needs.resolve-ecr.outputs.ecr_url }}:${{ github.sha }}
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

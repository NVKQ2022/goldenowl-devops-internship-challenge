name: CI/CD

on:
  push:
    branches:
      - 'feature/**'
      - main
    paths:
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
  workflow_dispatch:

env:
  TF_WORKING_DIR: terraform/env

jobs:
  test:
    uses: ./.github/workflows/test.yml
    with:
      working-directory: ${{ vars.WORKING_DIRECTORY || 'src' }}
      node-version: ${{ vars.NODE_VERSION || '20' }}

  scan:
    needs: test
    uses: ./.github/workflows/scan.yml
    with:
      context: src
      image-name: app:ci
      severity-threshold: ${{ vars.SEVERITY_THRESHOLD || 'HIGH' }}

  resolve-ecr:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      ecr_url: ${{ steps.get-ecr.outputs.ecr_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION || '1.9.0' }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Get ECR URL from remote state
        id: get-ecr
        run: |
          URL=$(terraform output -raw ecr_repository_url)
          echo "ecr_url=$URL" >> $GITHUB_OUTPUT
        working-directory: ${{ env.TF_WORKING_DIR }}

  # resolve-dockerhub:
  #   if: github.ref == 'refs/heads/main'
  #   runs-on: ubuntu-latest
  #   outputs:
  #     username: ${{ steps.resolve.outputs.username }}
  #   steps:
  #     - name: Resolve Docker Hub username
  #       id: resolve
  #       run: echo "username=${{ secrets.DOCKER_USERNAME }}" >> $GITHUB_OUTPUT

  # build-and-push-dockerhub:
  #   needs: resolve-dockerhub
  #   if: github.ref == 'refs/heads/main' && (vars.REGISTRY_TYPE == 'dockerhub' || vars.REGISTRY_TYPE == 'both' || vars.REGISTRY_TYPE == '')
  #   uses: ./.github/workflows/build.yml
  #   with:
  #     context: src
  #     registry-type: dockerhub
  #     image-tags: ${{ needs.resolve-dockerhub.outputs.username }}/${{ github.event.repository.name }}:${{ github.sha }}
  #   secrets:
  #     docker-username: ${{ secrets.DOCKER_USERNAME }}
  #     docker-password: ${{ secrets.DOCKER_PASSWORD }}

  build-and-push-ecr:
    needs: resolve-ecr
    if: github.ref == 'refs/heads/main' && (vars.REGISTRY_TYPE == 'ecr' || vars.REGISTRY_TYPE == 'both')
    uses: ./.github/workflows/build.yml
    with:
      context: src
      registry-type: ecr
      aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
      image-tags: ${{ needs.resolve-ecr.outputs.ecr_url }}:${{ github.sha }}
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy:
    needs: [resolve-ecr, build-and-push-ecr, build-and-push-dockerhub]
    if: github.ref == 'refs/heads/main' && (needs.build-and-push-ecr.result == 'success' || needs.build-and-push-dockerhub.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image URL
        id: image
        run: |
          if [[ "${{ needs.build-and-push-ecr.result }}" == "success" ]]; then
            echo "url=${{ needs.resolve-ecr.outputs.ecr_url }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TERRAFORM_VERSION || '1.9.0' }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="container_image=${{ steps.image.outputs.url }}"
        working-directory: ${{ env.TF_WORKING_DIR }}

name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      context:
        description: Docker build context directory
        required: false
        type: string
        default: src
      registry-type:
        description: Container registry type (dockerhub or ecr)
        required: false
        type: string
        default: dockerhub
      image-tags:
        description: Docker image tags (comma/newline separated)
        required: true
        type: string
      aws-region:
        description: AWS region (required when registry-type is ecr)
        required: false
        type: string
        default: ''
      ecr-repository:
        description: ECR repository name (required when registry-type is ecr)
        required: false
        type: string
        default: ''
    secrets:
      docker-username:
        description: Docker Hub username (required when registry-type is dockerhub)
        required: false
      docker-password:
        description: Docker Hub password or token (required when registry-type is dockerhub)
        required: false
      aws-access-key-id:
        description: AWS access key ID (required when registry-type is ecr)
        required: false
      aws-secret-access-key:
        description: AWS secret access key (required when registry-type is ecr)
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: inputs.registry-type == 'ecr'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      - name: Log in to Amazon ECR
        if: inputs.registry-type == 'ecr'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Log in to Docker Hub
        if: inputs.registry-type == 'dockerhub'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker-username }}
          password: ${{ secrets.docker-password }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          push: true
          tags: ${{ inputs.image-tags }}
